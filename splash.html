<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <script src="js/auth.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>FinancialFreedom</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Plus Jakarta Sans', Arial, sans-serif;
      background: #070c18;
      color: #f0f4ff;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Animated background glow ── */
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .bg-glow::before {
      content: '';
      position: absolute;
      top: -20%;
      left: -20%;
      width: 70%;
      height: 70%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,232,122,0.10) 0%, transparent 70%);
      animation: glowPulse 5s ease-in-out infinite;
    }
    .bg-glow::after {
      content: '';
      position: absolute;
      bottom: -20%;
      right: -20%;
      width: 60%;
      height: 60%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
      animation: glowPulse 5s ease-in-out infinite 2.5s;
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.5; transform: scale(0.95); }
      50%       { opacity: 1;   transform: scale(1.05); }
    }

    /* ── Floating particles ── */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      opacity: 0;
      animation: floatUp linear infinite;
      font-style: normal;
    }
    @keyframes floatUp {
      0%   { opacity: 0;   transform: translateY(100vh) rotate(0deg) scale(0.7); }
      10%  { opacity: 0.5; }
      90%  { opacity: 0.2; }
      100% { opacity: 0;   transform: translateY(-80px) rotate(360deg) scale(1.1); }
    }

    /* ── Grid lines (subtle chart look) ── */
    .grid-lines {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.04;
      background-image:
        linear-gradient(rgba(0,232,122,1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,232,122,1) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ── Main content ── */
    .splash-content {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      padding: 0 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* ── Logo / coin ── */
    .logo-wrap {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f7c948, #e8a200);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      margin-bottom: 24px;
      box-shadow: 0 0 40px rgba(247,201,72,0.35), 0 0 80px rgba(247,201,72,0.12);
      animation: coinBounce 3s ease-in-out infinite;
    }
    @keyframes coinBounce {
      0%, 100% { transform: translateY(0) scale(1);    box-shadow: 0 0 40px rgba(247,201,72,0.35), 0 0 80px rgba(247,201,72,0.12); }
      50%       { transform: translateY(-10px) scale(1.04); box-shadow: 0 20px 60px rgba(247,201,72,0.45), 0 0 100px rgba(247,201,72,0.18); }
    }

    /* ── App name ── */
    .app-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff 40%, #00e87a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .app-tagline {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(0,232,122,0.75);
      margin-bottom: 48px;
    }

    /* ── Quote cards ── */
    .quotes-wrap {
      width: 100%;
      position: relative;
      height: 90px;
      margin-bottom: 48px;
      overflow: hidden;
    }

    .quote-item {
      position: absolute;
      width: 100%;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.7s ease, transform 0.7s ease;
      padding: 18px 20px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.6;
      color: rgba(240,244,255,0.9);
    }

    .quote-item.active {
      opacity: 1;
      transform: translateY(0);
    }

    .quote-item::before {
      content: '"';
      font-size: 32px;
      font-weight: 800;
      color: rgba(0,232,122,0.3);
      line-height: 0;
      vertical-align: -12px;
      margin-right: 4px;
    }

    /* ── Dots indicator ── */
    .dots {
      display: flex;
      gap: 6px;
      margin-bottom: 48px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: all 0.4s ease;
    }
    .dot.active {
      background: #00e87a;
      width: 20px;
      border-radius: 4px;
    }

    /* ── CTA Button ── */
    .cta-btn {
      background: none;
      border: none;
      color: #00e87a;
      font-size: 20px;
      font-weight: 900;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      letter-spacing: 1px;
      padding: 8px 0;
      background: linear-gradient(135deg, #ffffff 40%, #00e87a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: opacity 0.2s ease, transform 0.2s ease;
      animation: fadeUp 0.6s 0.4s ease both;
    }
    .cta-btn:active {
      opacity: 0.7;
      transform: scale(0.97);
    }

    /* ── Chart mini animation ── */
    .mini-chart {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: 80px;
      z-index: 1;
      pointer-events: none;
      opacity: 0.15;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Loading bar ── */
    .loading-bar-wrap {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      z-index: 100;
      background: rgba(255,255,255,0.06);
    }
    .loading-bar {
      height: 100%;
      background: linear-gradient(90deg, #00e87a, #00cc66);
      width: 0%;
      transition: width linear;
    }
  </style>
</head>
<body>

<!-- Loading bar -->
<div class="loading-bar-wrap">
  <div class="loading-bar" id="loadingBar"></div>
</div>

<!-- BG effects -->
<div class="bg-glow"></div>
<div class="grid-lines"></div>
<div class="particles" id="particles"></div>

<!-- Mini chart wave SVG di bawah -->
<svg class="mini-chart" viewBox="0 0 480 80" preserveAspectRatio="none">
  <polyline
    points="0,70 40,60 80,65 120,45 160,50 200,30 240,35 280,20 320,28 360,15 400,22 440,10 480,18"
    fill="none" stroke="#00e87a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline
    points="0,75 40,70 80,72 120,62 160,65 200,55 240,58 280,48 320,52 360,42 400,46 440,38 480,40"
    fill="none" stroke="rgba(0,232,122,0.3)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

<!-- Main -->
<div class="splash-content">
  <div class="logo-wrap">🪙</div>

  <div class="app-title">FinancialFreedom</div>
  <div class="app-tagline">Kelola · Hemat · Bebas</div>

  <!-- Quote carousel -->
  <div class="quotes-wrap" id="quotesWrap"></div>

  <!-- Dots -->
  <div class="dots" id="dots"></div>

  <!-- CTA -->
  <button class="cta-btn" onclick="goToApp()">MULAI</button>
</div>

<script>
const quotes = [
  "Keuangan sehat dimulai dari kesadaran kecil setiap hari.",
  "Bukan soal berapa banyak uangmu, tapi seberapa baik kamu mengelolanya.",
  "Langkah kecil hari ini adalah kebebasan finansial besok.",
  "Mencatat bukan membatasi hidup, tapi memberi kendali.",
  "Setiap pengeluaran yang tercatat adalah keputusan yang lebih bijak.",
  "Uang yang dikelola dengan baik bekerja untukmu."
];

let current = 0;
let timer;
const INTERVAL = 3200;

const wrap = document.getElementById('quotesWrap');
const dotsEl = document.getElementById('dots');

// Build quote elements
quotes.forEach((q, i) => {
  const el = document.createElement('div');
  el.className = 'quote-item' + (i === 0 ? ' active' : '');
  el.textContent = q;
  wrap.appendChild(el);

  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.onclick = () => goToQuote(i);
  dotsEl.appendChild(dot);
});

function goToQuote(idx) {
  document.querySelectorAll('.quote-item')[current].classList.remove('active');
  document.querySelectorAll('.dot')[current].classList.remove('active');
  current = idx;
  document.querySelectorAll('.quote-item')[current].classList.add('active');
  document.querySelectorAll('.dot')[current].classList.add('active');
  resetLoadingBar();
}

function nextQuote() {
  goToQuote((current + 1) % quotes.length);
}

// Loading bar
const bar = document.getElementById('loadingBar');
function resetLoadingBar() {
  bar.style.transition = 'none';
  bar.style.width = '0%';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      bar.style.transition = `width ${INTERVAL}ms linear`;
      bar.style.width = '100%';
    });
  });
}

resetLoadingBar();
timer = setInterval(nextQuote, INTERVAL);

// Floating particles
(function() {
  const container = document.getElementById('particles');
  const emojis = ['💰','💵','🪙','💴','💶','💷','💸','🏦','📈','💳','🎯','📊'];
  for (let i = 0; i < 20; i++) {
    const el = document.createElement('span');
    el.className = 'particle';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.cssText = `
      left: ${Math.random() * 100}%;
      font-size: ${10 + Math.random() * 14}px;
      animation-duration: ${9 + Math.random() * 14}s;
      animation-delay: ${Math.random() * 12}s;
    `;
    container.appendChild(el);
  }
})();

function goToApp() {
  clearInterval(timer);
  if (isFirstTime()) {
    // Pertama kali install → setup password
    document.body.style.transition = 'opacity 0.4s ease';
    document.body.style.opacity = '0';
    setTimeout(() => { window.location.href = 'setup.html'; }, 400);
  } else {
    // Sudah punya akun → tampilkan form login
    showLoginForm();
  }
}

function showLoginForm() {
  document.getElementById('loginModal').style.display = 'flex';
  setTimeout(() => document.getElementById('loginUsername').focus(), 300);
}

function doLogin() {
  const auth = getAuth();
  const username = document.getElementById('loginUsername').value.trim().toLowerCase();
  const password = document.getElementById('loginPassword').value;

  if (!username || !password) {
    showLoginError('Isi username dan password.');
    return;
  }

  if (username !== auth.username || simpleHash(password) !== auth.password) {
    showLoginError('Username atau password salah.');
    // Shake effect
    document.querySelector('.login-card').classList.add('shake');
    setTimeout(() => document.querySelector('.login-card').classList.remove('shake'), 500);
    return;
  }

  setLoggedIn();
  document.body.style.transition = 'opacity 0.4s ease';
  document.body.style.opacity = '0';
  setTimeout(() => { window.location.href = 'index.html'; }, 400);
}

function showForgot() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('forgotForm').style.display = 'block';
}

function doForgot() {
  const auth = getAuth();
  const fullName = document.getElementById('forgotFullName').value.trim();
  if (!fullName) { showLoginError('Masukkan nama lengkap.'); return; }

  if (simpleHash(fullName.toLowerCase()) !== auth.fullName) {
    showLoginError('Nama lengkap tidak sesuai.');
    return;
  }

  // Reset ke setup
  document.getElementById('loginModal').style.display = 'none';
  localStorage.removeItem('ff_auth');
  document.body.style.transition = 'opacity 0.4s ease';
  document.body.style.opacity = '0';
  setTimeout(() => { window.location.href = 'setup.html'; }, 400);
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.innerText = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

function backToLogin() {
  document.getElementById('forgotForm').style.display = 'none';
  document.getElementById('loginForm').style.display = 'block';
}

// Check if already logged in this session
if (!isFirstTime() && isLoggedIn()) {
  // Sudah login di session ini → langsung ke beranda
  window.location.href = 'index.html';
}

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const modal = document.getElementById('loginModal');
  if (!modal || modal.style.display === 'none') return;
  if (document.getElementById('forgotForm').style.display !== 'none') doForgot();
  else doLogin();
});
</script>

<!-- LOGIN MODAL -->
<div id="loginModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:3000;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);">
  <div class="login-card" style="width:100%;max-width:480px;background:#0d1425;border-radius:24px 24px 0 0;border-top:1px solid rgba(255,255,255,0.1);padding:8px 20px 40px;animation:slideUp 0.3s cubic-bezier(0.32,0.72,0,1);">
    <div style="width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:12px auto 20px;"></div>

    <div id="loginError" style="display:none;background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.3);border-radius:10px;padding:10px 14px;font-size:13px;color:#ff4757;margin-bottom:14px;"></div>

    <!-- Form Login -->
    <div id="loginForm">
      <div style="text-align:center;margin-bottom:20px;">
        <div style="font-size:24px;margin-bottom:6px;">🔐</div>
        <div style="font-size:16px;font-weight:700;color:#fff;">Selamat Datang Kembali</div>
        <div style="font-size:12px;color:rgba(240,244,255,0.5);margin-top:2px;">Masuk ke FinancialFreedom</div>
      </div>
      <div style="margin-bottom:12px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(240,244,255,0.5);margin-bottom:6px;">Username</div>
        <input type="text" id="loginUsername" placeholder="Username kamu" autocomplete="off"
          style="width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#f0f4ff;font-size:15px;font-family:inherit;outline:none;"
          oninput="this.value=this.value.replace(/\s/g,'').toLowerCase()">
      </div>
      <div style="margin-bottom:6px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(240,244,255,0.5);margin-bottom:6px;">Password</div>
        <div style="position:relative;">
          <input type="password" id="loginPassword" placeholder="Password kamu"
            style="width:100%;padding:12px 44px 12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#f0f4ff;font-size:15px;font-family:inherit;outline:none;">
          <button onclick="toggleLoginPass()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(240,244,255,0.4);cursor:pointer;font-size:16px;" id="togglePassBtn">👁️</button>
        </div>
      </div>
      <div style="text-align:right;margin-bottom:16px;">
        <button onclick="showForgot()" style="background:none;border:none;color:rgba(0,232,122,0.7);font-size:12px;cursor:pointer;font-family:inherit;">Lupa password?</button>
      </div>
      <button onclick="doLogin()" style="width:100%;padding:14px;border-radius:12px;border:none;background:#00e87a;color:#070c18;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;box-shadow:0 4px 20px rgba(0,232,122,0.3);">Masuk</button>
    </div>

    <!-- Form Lupa Password -->
    <div id="forgotForm" style="display:none;">
      <div style="text-align:center;margin-bottom:20px;">
        <div style="font-size:24px;margin-bottom:6px;">🔑</div>
        <div style="font-size:16px;font-weight:700;color:#fff;">Pemulihan Akun</div>
        <div style="font-size:12px;color:rgba(240,244,255,0.5);margin-top:2px;">Masukkan nama lengkap untuk mereset akun</div>
      </div>
      <div style="margin-bottom:16px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(240,244,255,0.5);margin-bottom:6px;">Nama Lengkap</div>
        <input type="text" id="forgotFullName" placeholder="Nama lengkap tanpa spasi" autocomplete="off"
          style="width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#f0f4ff;font-size:15px;font-family:inherit;outline:none;"
          oninput="this.value=this.value.replace(/\s/g,'')">
        <div style="font-size:10px;color:rgba(255,165,0,0.6);margin-top:4px;">⚠️ Akun akan direset, data tidak terhapus</div>
      </div>
      <button onclick="doForgot()" style="width:100%;padding:14px;border-radius:12px;border:none;background:#ffa502;color:#070c18;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;margin-bottom:10px;">Reset Akun</button>
      <button onclick="backToLogin()" style="width:100%;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(240,244,255,0.7);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;">← Kembali Login</button>
    </div>
  </div>
</div>

<style>
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}
.shake { animation: shake 0.4s ease; }
</style>

<script>
function toggleLoginPass() {
  const input = document.getElementById('loginPassword');
  const btn   = document.getElementById('togglePassBtn');
  if (input.type === 'password') { input.type = 'text'; btn.innerText = '🙈'; }
  else { input.type = 'password'; btn.innerText = '👁️'; }
}
</script>
</body>
</html>
