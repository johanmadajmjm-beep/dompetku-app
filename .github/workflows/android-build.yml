name: Build Android APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Prepare web folder
        run: |
          mkdir -p www
          cp -r *.html css js README.md www/
      - name: Install dependencies
        run: |
          npm init -y
          npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5
      - name: Create Capacitor config
        run: |
          cat > capacitor.config.json << EOF
          {
            "appId": "com.financialfreedom.app",
            "appName": "FinancialFreedom",
            "webDir": "www"
          }
          EOF
      - name: Add Android platform
        run: npx cap add android
      - name: Copy web assets
        run: npx cap copy android
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: financialfreedom-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
