  <script>
var AUTH_KEY='ff_auth';
function getAuth(){try{return JSON.parse(localStorage.getItem(AUTH_KEY)||'null');}catch(e){return null;}}
function saveAuth(d){localStorage.setItem(AUTH_KEY,JSON.stringify(d));}
function isFirstTime(){return getAuth()===null;}
function isLoggedIn(){return sessionStorage.getItem('ff_logged_in')==='1';}
function setLoggedIn(){sessionStorage.setItem('ff_logged_in','1');}
function logout(){sessionStorage.removeItem('ff_logged_in');window.location.href='splash.html';}
function simpleHash(s){var h=0;for(var i=0;i<s.length;i++){var c=s.charCodeAt(i);h=((h<<5)-h)+c;h=h&h;}return h.toString(36);}
</script>
  <script>if(!isFirstTime()&&!isLoggedIn())window.location.replace("splash.html");</script>

<script>
// Override setType untuk update warna tombol
const _origSetType = typeof setType === 'function' ? setType : null;
document.addEventListener('DOMContentLoaded', () => {
  const origSetType = window.setType;
  window.setType = function(type) {
    if (origSetType) origSetType(type);
    const btnIncome  = document.getElementById('btnIncome');
    const btnExpense = document.getElementById('btnExpense');
    if (!btnIncome || !btnExpense) return;
    if (type === 'income') {
      btnIncome.classList.add('active', 'income-active');
      btnExpense.classList.remove('active', 'expense-active');
    } else {
      btnExpense.classList.add('active', 'expense-active');
      btnIncome.classList.remove('active', 'income-active');
    }
    // Switch kategori sesuai tipe
    const catIncome  = document.getElementById('catIncome');
    const catExpense = document.getElementById('catExpense');
    const catPlaceholder = document.getElementById('catPlaceholder');
    const catSelect  = document.getElementById('category');
    if (catIncome && catExpense) {
      catIncome.style.display  = type === 'income'  ? '' : 'none';
      catExpense.style.display = type === 'expense' ? '' : 'none';
      if (catPlaceholder) catPlaceholder.style.display = 'none';
      // Auto-pilih opsi pertama sesuai tipe
      catSelect.value = type === 'income' ? 'gaji' : 'makan';
    }
  };
});
</script>
<script>
// Extend getCategoryIcon untuk kategori baru
const _origGetCategoryIcon = window.getCategoryIcon;
window.getCategoryIcon = function(cat) {
  const extra = {
    investasi: '💹', bonus: '🎁', freelance: '💻',
    sewa: '🏠', hadiah: '🎀', cicilan: '💳',
    pakaian: '👗', rumah: '🏡', komunikasi: '📱',
    sosial: '🤝', olahraga: '⚽', liburan: '✈️',
    asuransi: '🛡️', donasi: '🕌'
  };
  return extra[cat] || (_origGetCategoryIcon ? _origGetCategoryIcon(cat) : '📌');
};
</script>
