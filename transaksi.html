<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FinancialFreedom</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app-container">
  <header class="glass-header">
    <button class="back-btn" onclick="window.location.href='index.html'">←</button>
    <h2>Transaksi</h2>
    <div style="width:40px;"></div>
  </header>

  <div class="form-container glass">
    <h3 id="formTitle">Tambah Transaksi</h3>
    <input type="hidden" id="editId">

    <div class="input-group">
      <label>Tipe Transaksi</label>
      <div class="type-selector">
        <button class="type-btn" onclick="setType('income')">💰 Pemasukan</button>
        <button class="type-btn active" onclick="setType('expense')">💸 Pengeluaran</button>
      </div>
    </div>

    <div class="input-group">
      <label>Nominal</label>
      <input type="text" id="amount" class="premium-input money-input" placeholder="Contoh: 2.000.000">
    </div>

    <div class="input-group">
      <label>Kategori</label>
      <select id="category" class="premium-select">
        <option value="makan">🍔 Makan</option>
        <option value="transport">🚗 Transport</option>
        <option value="belanja">🛍️ Belanja</option>
        <option value="gaji">💼 Gaji</option>
        <option value="usaha">📈 Usaha</option>
        <option value="tagihan">📄 Tagihan</option>
        <option value="kesehatan">🏥 Kesehatan</option>
        <option value="hiburan">🎬 Hiburan</option>
        <option value="pendidikan">📚 Pendidikan</option>
        <option value="lainnya">📌 Lainnya</option>
      </select>
    </div>

    <div class="input-group">
      <label>Tanggal</label>
      <input type="date" id="date" class="premium-input">
    </div>

    <div class="input-group">
      <label>Metode Pembayaran</label>
      <select id="paymentMethod" class="premium-select">
        <option value="tunai">💵 Tunai</option>
        <option value="transfer">🏦 Transfer</option>
        <option value="kartu kredit">💳 Kartu Kredit</option>
        <option value="e-wallet">📱 E-Wallet</option>
      </select>
    </div>

    <div class="input-group">
      <label>Catatan</label>
      <textarea id="note" rows="2" class="premium-input" placeholder="Catatan tambahan..."></textarea>
    </div>

    <button class="btn-primary" onclick="saveTransactionFromForm()">💾 Simpan Transaksi</button>
    <button class="btn-secondary" onclick="resetTransactionForm()">↺ Reset</button>
  </div>

  <div class="history-section">
    <div class="section-title" style="padding:0 16px;">
      <h3>📜 Riwayat Transaksi</h3>
    </div>

    <div class="filter-bar" style="padding:0 16px;">
      <input type="text" id="searchInput" class="search-input" placeholder="🔍 Cari...">
      <select id="filterCategory" class="filter-select">
        <option value="">Semua Kategori</option>
        <option value="makan">Makan</option>
        <option value="transport">Transport</option>
        <option value="belanja">Belanja</option>
        <option value="gaji">Gaji</option>
        <option value="usaha">Usaha</option>
        <option value="tagihan">Tagihan</option>
        <option value="kesehatan">Kesehatan</option>
        <option value="hiburan">Hiburan</option>
        <option value="pendidikan">Pendidikan</option>
        <option value="lainnya">Lainnya</option>
      </select>
      <select id="sortOrder" class="filter-select">
        <option value="desc">Terbaru</option>
        <option value="asc">Terlama</option>
      </select>
    </div>

    <div id="transactionList" class="transaction-list"></div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content glass">
      <div class="modal-handle"></div>
      <h3>Opsi Transaksi</h3>
      <button class="modal-btn edit" onclick="editTransactionFromModal()">✏️ Edit</button>
      <button class="modal-btn delete" onclick="deleteTransactionFromModal()">🗑️ Hapus</button>
      <button class="modal-btn cancel" onclick="closeModal()">Batal</button>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Beranda</span>
    </a>
    <a href="transaksi.html" class="nav-item active">
      <span class="nav-icon">📝</span>
      <span class="nav-label">Transaksi</span>
    </a>
    <a href="analisis.html" class="nav-item">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Analisis</span>
    </a>
    <a href="utang.html" class="nav-item">
      <span class="nav-icon">💸</span>
      <span class="nav-label">Utang</span>
    </a>
    <a href="tabungan.html" class="nav-item">
      <span class="nav-icon">🎯</span>
      <span class="nav-label">Tabungan</span>
    </a>
    <a href="pengaturan.html" class="nav-item">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Setting</span>
    </a>
  </nav>
</div>

<script src="js/storage.js"></script>
<script src="js/transaksi.js"></script>
</body>
</html>
