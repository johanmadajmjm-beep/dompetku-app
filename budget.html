<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Dompetku - Budget</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app-container">
  <header class="glass-header">
    <button class="back-btn" onclick="window.location.href='index.html'">←</button>
    <h2>Budget Bulanan</h2>
    <button class="add-btn" onclick="showBudgetModal()">+ Budget</button>
  </header>

  <div id="budgetList" class="savings-list"></div>

  <div id="budgetModal" class="modal">
    <div class="modal-content glass">
      <h3 id="budgetModalTitle">Tambah Budget</h3>
      <input type="hidden" id="budgetId">

      <select id="budgetCategory" class="premium-select">
        <option value="makan">🍔 Makan</option>
        <option value="transport">🚗 Transport</option>
        <option value="belanja">🛍️ Belanja</option>
        <option value="tagihan">📄 Tagihan</option>
        <option value="kesehatan">🏥 Kesehatan</option>
        <option value="hiburan">🎬 Hiburan</option>
        <option value="pendidikan">📚 Pendidikan</option>
        <option value="lainnya">📌 Lainnya</option>
      </select>

      <input type="text" id="budgetLimit" placeholder="Limit Budget" class="premium-input money-input">

      <button class="btn-primary" onclick="saveBudgetFromForm()">Simpan</button>
      <button class="btn-secondary" onclick="closeBudgetModal()">Batal</button>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">🏠 Beranda</a>
    <a href="transaksi.html" class="nav-item">📝 Transaksi</a>
    <a href="analisis.html" class="nav-item">📊 Analisis</a>
    <a href="tabungan.html" class="nav-item">🎯 Tabungan</a>
    <a href="budget.html" class="nav-item active">💰 Budget</a>
    <a href="pengaturan.html" class="nav-item">⚙️ Setting</a>
  </nav>
</div>

<script src="js/storage.js"></script>
<script src="js/budget.js"></script>
</body>
</html>
