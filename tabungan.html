<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FinancialFreedom</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app-container">
  <header class="glass-header">
    <button class="back-btn" onclick="window.location.href='index.html'">←</button>
    <h2>Target Tabungan</h2>
    <button class="add-btn" onclick="showTargetModal()">+ Target</button>
  </header>
  <div id="savingsList" class="savings-list"></div>
  <div id="targetModal" class="modal">
    <div class="modal-content glass">
      <div class="modal-handle"></div>
      <h3>Target Tabungan</h3>
      <input type="hidden" id="targetId">
      <input type="text" id="targetName" placeholder="Nama Target" class="premium-input">
      <input type="text" id="targetAmount" placeholder="Nominal Target" class="premium-input money-input">
      <input type="text" id="savedAmount" placeholder="Sudah Terkumpul" class="premium-input money-input">
      <input type="date" id="targetDeadline" class="premium-input">
      <button class="btn-primary" onclick="saveTarget()">Simpan Target</button>
      <button class="btn-secondary" onclick="closeTargetModal()">Batal</button>
    </div>
  </div>
  <div id="depositModal" class="modal">
    <div class="modal-content glass">
      <div class="modal-handle"></div>
      <h3>Tambah Setoran</h3>
      <input type="hidden" id="depositTargetId">
      <input type="text" id="depositAmount" placeholder="Jumlah Setoran" class="premium-input money-input">
      <button class="btn-primary" onclick="addDeposit()">Tambah Setoran</button>
      <button class="btn-secondary" onclick="closeDepositModal()">Batal</button>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Beranda</span>
    </a>
    <a href="transaksi.html" class="nav-item">
      <span class="nav-icon">📝</span>
      <span class="nav-label">Transaksi</span>
    </a>
    <a href="analisis.html" class="nav-item">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Analisis</span>
    </a>
    <a href="utang.html" class="nav-item">
      <span class="nav-icon">💸</span>
      <span class="nav-label">Utang</span>
    </a>
    <a href="tabungan.html" class="nav-item active">
      <span class="nav-icon">🎯</span>
      <span class="nav-label">Tabungan</span>
    </a>
    <a href="pengaturan.html" class="nav-item">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Setting</span>
    </a>
  </nav>
</div>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
</body>
</html>
