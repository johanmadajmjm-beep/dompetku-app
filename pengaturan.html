<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dompetku - Pengaturan</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <header class="glass-header">
            <button class="back-btn" onclick="window.location.href='index.html'">←</button>
            <h2>Pengaturan</h2>
            <div style="width: 40px;"></div>
        </header>

        <div class="settings-section glass">
            <h3>👤 Profil</h3>
            <div class="setting-item">
                <label>Nama Pengguna</label>
                <input type="text" id="settingsUserName" class="premium-input">
            </div>
        </div>

        <div class="settings-section glass">
            <h3>🎨 Tampilan</h3>
            <div class="setting-item">
                <label>Mode Tema</label>
                <select id="themeSelect" class="premium-select">
                    <option value="dark">Dark Premium</option>
                    <option value="light">Light Mode</option>
                </select>
            </div>
        </div>

        <div class="settings-section glass">
            <h3>💾 Data</h3>
            <button class="btn-secondary" onclick="exportData()">📤 Export JSON</button>
            <input type="file" id="importFile" accept=".json" style="display: none;">
            <button class="btn-secondary" onclick="document.getElementById('importFile').click()">📥 Import JSON</button>
            <button class="btn-danger" onclick="resetAllData()">⚠️ Reset Semua Data</button>
        </div>

        <div class="settings-section glass">
            <h3>ℹ️ Tentang</h3>
            <p>Dompetku v1.0<br>Aplikasi Keuangan Pribadi Premium</p>
        </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <span class="nav-icon">🏠</span><span>Beranda</span>
            </a>
            <a href="transaksi.html" class="nav-item">
                <span class="nav-icon">📝</span><span>Transaksi</span>
            </a>
            <a href="analisis.html" class="nav-item">
                <span class="nav-icon">📊</span><span>Analisis</span>
            </a>
            <a href="tabungan.html" class="nav-item">
                <span class="nav-icon">🎯</span><span>Tabungan</span>
            </a>
            <a href="pinjaman.html" class="nav-item">
                <span class="nav-icon">💳</span><span>Pinjaman</span>
            </a>
            <a href="pengaturan.html" class="nav-item active">
                <span class="nav-icon">⚙️</span><span>Pengaturan</span>
            </a>
        </nav>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
