<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FinancialFreedom</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .trend-section {
      margin: 0 16px 16px;
      padding: 16px 18px;
    }
    .trend-section h3 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .ringkasan-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .ringkasan-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 10px 12px;
    }
    .ringkasan-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(240,244,255,0.5);
      margin-bottom: 4px;
    }
    .ringkasan-value {
      font-size: 13px;
      font-weight: 700;
    }
    .ringkasan-item.full {
      grid-column: 1 / -1;
    }
  </style>
</head>
<body>
<div class="app-container">
  <header class="glass-header">
    <button class="back-btn" onclick="window.location.href='index.html'">←</button>
    <h2>Analisis Keuangan</h2>
    <div style="width:40px;"></div>
  </header>

  <div class="stats-summary glass">
    <div class="summary-item">
      <span>Total Transaksi</span>
      <strong id="totalTransactions">0</strong>
    </div>
    <div class="summary-item">
      <span>Rata-rata Masuk</span>
      <strong id="avgIncome">Rp 0</strong>
    </div>
    <div class="summary-item">
      <span>Rata-rata Keluar</span>
      <strong id="avgExpense">Rp 0</strong>
    </div>
  </div>

  <!-- Trend line chart -->
  <div class="chart-container glass">
    <h3>📈 Trend Pemasukan & Pengeluaran</h3>
    <canvas id="incomeExpenseTrendChart" height="200"></canvas>
  </div>

  <!-- Bar chart pengeluaran per kategori -->
  <div class="chart-container glass">
    <h3>📊 Pengeluaran per Kategori</h3>
    <canvas id="expenseBarChart" height="220"></canvas>
  </div>

  <!-- Bar chart pemasukan per kategori -->
  <div class="chart-container glass">
    <h3>📈 Pemasukan per Kategori</h3>
    <canvas id="incomeBarChart" height="220"></canvas>
  </div>

  <!-- Ringkasan bulanan -->
  <div class="trend-section glass">
    <h3>📉 Ringkasan Bulanan</h3>
    <div id="trendInfo"></div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Beranda</span>
    </a>
    <a href="transaksi.html" class="nav-item">
      <span class="nav-icon">📝</span>
      <span class="nav-label">Transaksi</span>
    </a>
    <a href="analisis.html" class="nav-item active">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Analisis</span>
    </a>
    <a href="utang.html" class="nav-item">
      <span class="nav-icon">💸</span>
      <span class="nav-label">Utang</span>
    </a>
    <a href="tabungan.html" class="nav-item">
      <span class="nav-icon">🎯</span>
      <span class="nav-label">Tabungan</span>
    </a>
    <a href="pengaturan.html" class="nav-item">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Setting</span>
    </a>
  </nav>
</div>
<script src="js/storage.js"></script>
<script src="js/charts.js"></script>
<script src="js/analisis.js"></script>
</body>
</html>
